<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>UFC Pay Sim</title>
    
    <style>
      /* Ensure the whole screen is used */
      html, body {
        height: 100%;
        margin: 0;
        padding: 0;
      }

      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center; /* This pulls everything to the vertical center */
        overflow: hidden;

        background-image: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), 
                          url('ufcoctagon.jpg');
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        color: white;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      }

      /* Stats box at the top */
      .game-box {
        background: rgba(0, 0, 0, 0.85);
        padding: 20px;
        border-radius: 15px;
        border: 2px solid #ff0000; /* UFC Red Border */
        width: 80%;
        max-width: 400px;
        text-align: center;
        margin-bottom: 30px;
        box-shadow: 0 0 20px rgba(0,0,0,0.5);
      }

      #fighterPay {
        font-size: 3rem;
        margin: 10px 0;
        color: #00ff88;
      }

      #fighter-container {
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100%;
      }

      #fighter {
        max-width: 250px; /* Limits size on laptop */
        height: auto;
        cursor: pointer;
        transition: transform 0.05s;
        filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5));
      }

      /* The 'PUNCH' animation */
      #fighter:active {
        transform: scale(0.9);
      }
    </style>
</head>
<body>

  <div class="game-box">
    <h2 id="tierName" style="margin:0; letter-spacing: 2px;">AMATEUR TIER</h2>
    <h1 id="fighterPay">$0</h1>
    <p id="message" style="font-style: italic; color: #ccc;">Click the bag to train!</p>
  </div>

  <div id="fighter-container">
    <img id="fighter" src="ufcbag.gif" alt="fighter">
  </div>

  <script>
    // Audio Setup
    const punchSound = new Audio("punch1.wav"); 
    punchSound.volume = 0.5;

    // Game Logic Variables
    let fighterPay = 0;
    let payAmount = 500;

    const fighterImg = document.getElementById("fighter");
    const payDisplay = document.getElementById("fighterPay");

    fighterImg.onclick = function() {
      // 1. Sound Logic
      const clickSound = punchSound.cloneNode();
      clickSound.volume = 0.5;
      clickSound.play().catch(() => {});

      // 2. Pay Logic
      fighterPay += payAmount;
      payDisplay.innerText = "$" + fighterPay.toLocaleString();

      // You can add your Tier Upgrade logic back here!
    };
  </script>
</body>
</html>
