<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>UFC Pay Sim</title>
    
    <style>
      html, body { height: 100%; margin: 0; padding: 0; }

      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center; 
        overflow: hidden;
        /* Corrected background logic */
        background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), 
                    url('ufcoctagon.jpg') no-repeat center center fixed;
        background-size: cover;
        color: white;
        font-family: 'Arial Black', sans-serif;
      }

      .game-box {
        background: rgba(0, 0, 0, 0.9);
        padding: 20px;
        border-radius: 15px;
        border: 3px solid #d20a0a; /* UFC Red */
        width: 90%;
        max-width: 400px;
        text-align: center;
        margin-bottom: 20px;
        box-shadow: 0 0 30px rgba(0,0,0,0.8);
      }

      #fighterPay { font-size: 3rem; margin: 10px 0; color: #00ff88; }
      #tierName { color: #fff; text-transform: uppercase; letter-spacing: 2px; }

      #fighter {
        max-width: 280px;
        height: auto;
        cursor: pointer;
        transition: transform 0.05s;
        filter: drop-shadow(0 10px 10px rgba(0,0,0,0.5));
      }

      #fighter:active { transform: scale(0.92); }
      
      #message { font-size: 1rem; color: #ffeb3b; min-height: 1.2em; }
    </style>
</head>
<body>

  <div class="game-box">
    <h2 id="tierName">AMATEUR TIER</h2>
    <h1 id="fighterPay">$0</h1>
    <p id="message">Click the bag to start your career!</p>
  </div>

  <div id="fighter-container">
    <img id="fighter" src="ufcbag.gif" alt="fighter">
  </div>

  <script>
    // --- AUDIO ---
    const punchSound = new Audio("punch1.wav"); 
    punchSound.volume = 0.5;

    // --- GAME DATA ---
    let fighterPay = 0;
    let currentTierIndex = 0;
    let payAmount = 500;

    const tiers = [
      { name: "Amateur", threshold: 0, bonus: 0 },
      { name: "Prospect", threshold: 25000, bonus: 500 },
      { name: "Main Card", threshold: 75000, bonus: 1000 },
      { name: "Ranked", threshold: 200000, bonus: 2000 },
      { name: "Top Contender", threshold: 500000, bonus: 5000 },
      { name: "Champion", threshold: 1000000, bonus: 10000 }
    ];

    const fighterImg = document.getElementById("fighter");
    const payDisplay = document.getElementById("fighterPay");
    const tierDisplay = document.getElementById("tierName");
    const message = document.getElementById("message");

    fighterImg.onclick = function() {
      // 1. Play Sound
      const clickSound = punchSound.cloneNode();
      clickSound.volume = 0.5;
      clickSound.play().catch(() => {});

      // 2. Add Money
      fighterPay += payAmount;
      payDisplay.innerText = "$" + fighterPay.toLocaleString();

      // 3. Check for Rank Up
      checkTierUpgrade();
    };

    function checkTierUpgrade() {
      let nextTier = tiers[currentTierIndex + 1];
      
      if (nextTier && fighterPay >= nextTier.threshold) {
        currentTierIndex++;
        payAmount += tiers[currentTierIndex].bonus;
        
        tierDisplay.innerText = tiers[currentTierIndex].name + " TIER";
        message.innerText = "PROMOTED! You are now a " + tiers[currentTierIndex].name + "!";
        
        // Visual flash for promotion
        document.querySelector('.game-box').style.borderColor = "#00ff88";
        setTimeout(() => {
          document.querySelector('.game-box').style.borderColor = "#d20a0a";
        }, 500);
      }
    }
  </script>
</body>
</html>
