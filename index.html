<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>UFC Pay Sim</title>
    
    <style>
      /* Fixes the 'user-select' warning and sets up layout */
      * {
        -webkit-user-select: none; /* Safari */
        -ms-user-select: none;     /* IE 10+ */
        user-select: none;         /* Standard syntax */
        box-sizing: border-box;
      }

      html, body { 
        height: 100%; 
        margin: 0; 
        padding: 0; 
        background-color: #1a1a1a; /* Fallback color */
      }

      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center; 
        
        /* Updated Background - TRY CHANGING .jpg TO .jpeg HERE IF IT FAILS */
        background-image: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), 
                          url('ufcoctagon.jpg');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        
        color: white;
        font-family: 'Arial Black', sans-serif;
      }

      .game-box {
        background: rgba(0, 0, 0, 0.9);
        padding: 20px;
        border-radius: 15px;
        border: 3px solid #d20a0a;
        width: 90%;
        max-width: 400px;
        text-align: center;
        margin-bottom: 20px;
        box-shadow: 0 0 30px rgba(0,0,0,0.8);
      }

      #fighterPay { font-size: 3rem; margin: 10px 0; color: #00ff88; }

      #fighter {
        max-width: 250px;
        height: auto;
        cursor: pointer;
        transition: transform 0.05s;
      }

      #fighter:active { transform: scale(0.9); }
    </style>
</head>
<body>

  <div class="game-box">
    <h2 id="tierName">AMATEUR TIER</h2>
    <h1 id="fighterPay">$0</h1>
    <p id="message">Click the bag to train!</p>
  </div>

  <div id="fighter-container">
    <img id="fighter" src="ufcbag.gif" alt="fighter">
  </div>

  <script>
    const punchSound = new Audio("punch1.wav"); 
    punchSound.volume = 0.5;

    let fighterPay = 0;
    let currentTierIndex = 0;
    let payAmount = 500;

    const tiers = [
      { name: "Amateur", threshold: 0, bonus: 0 },
      { name: "Prospect", threshold: 25000, bonus: 500 },
      { name: "Main Card", threshold: 75000, bonus: 1000 },
      { name: "Ranked", threshold: 200000, bonus: 2000 },
      { name: "Top Contender", threshold: 500000, bonus: 5000 },
      { name: "Champion", threshold: 1000000, bonus: 10000 }
    ];

    const fighterImg = document.getElementById("fighter");
    const payDisplay = document.getElementById("fighterPay");
    const tierDisplay = document.getElementById("tierName");
    const message = document.getElementById("message");

    fighterImg.onclick = function() {
      // Audio
      const clickSound = punchSound.cloneNode();
      clickSound.play().catch(() => {});

      // Logic
      fighterPay += payAmount;
      payDisplay.innerText = "$" + fighterPay.toLocaleString();

      // Check for Promotion
      let nextTier = tiers[currentTierIndex + 1];
      if (nextTier && fighterPay >= nextTier.threshold) {
        currentTierIndex++;
        payAmount += tiers[currentTierIndex].bonus;
        tierDisplay.innerText = tiers[currentTierIndex].name + " TIER";
        message.innerText = "PROMOTED TO " + tiers[currentTierIndex].name + "!";
      }
    };
  </script>
</body>
</html>
